<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#06080C" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('o4f-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <meta name="description" content="O4F is a systematic, multi-strategy investment firm. We treat markets as a problem of computation and probability — engineering math-first, technology-first strategies across equities, ETFs, and derivatives." />
    <meta property="og:title" content="O4F — Systematic, Multi-Strategy Investing" />
    <meta property="og:description" content="A math-first, technology-first investment firm. Markets are computation and probability — we build the system that solves them." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <title>O4F — Systematic, Multi-Strategy Investing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  </body>
</html>

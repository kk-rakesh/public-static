<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>O4F</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the current path into a query string so index.html can restore it.
      // pathSegmentsToKeep = 0 because the site is served at the root domain (o4f.co.in).
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
